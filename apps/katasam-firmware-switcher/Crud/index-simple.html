<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firmware Flasher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
            text-align: center;
        }

        .subtitle {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .status {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }

        .status-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .status-label {
            color: #666;
            font-weight: 500;
        }

        .status-value {
            color: #333;
            font-weight: 600;
        }

        .status-value.connected {
            color: #10b981;
        }

        .status-value.disconnected {
            color: #ef4444;
        }

        .firmware-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }

        .firmware-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .firmware-card {
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .firmware-card:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .firmware-card.selected {
            border-color: #667eea;
            background: #f3f4ff;
        }

        .firmware-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .firmware-desc {
            font-size: 12px;
            color: #666;
        }

        .flash-btn {
            width: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .flash-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .flash-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .progress-section {
            margin-top: 20px;
            display: none;
        }

        .progress-section.visible {
            display: block;
        }

        .progress-bar {
            background: #e5e7eb;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-fill {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }

        .progress-text {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .log {
            background: #1f2937;
            color: #d1d5db;
            border-radius: 10px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            font-family: 'Monaco', monospace;
            font-size: 12px;
            line-height: 1.6;
        }

        .log-entry {
            margin-bottom: 5px;
        }

        .log-entry.success {
            color: #10b981;
        }

        .log-entry.error {
            color: #ef4444;
        }

        .log-entry.info {
            color: #60a5fa;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎸 Firmware Flasher</h1>
        <p class="subtitle">Automatic device detection and firmware switching</p>

        <div class="status">
            <div class="status-item">
                <span class="status-label">Device:</span>
                <span class="status-value disconnected" id="deviceStatus">Searching...</span>
            </div>
            <div class="status-item">
                <span class="status-label">Current Firmware:</span>
                <span class="status-value" id="currentFirmware">Unknown</span>
            </div>
        </div>

        <div class="firmware-section">
            <div class="section-title">Select Target Firmware</div>
            <div class="firmware-grid">
                <div class="firmware-card" data-firmware="Classic1">
                    <div class="firmware-name">Classic 1</div>
                    <div class="firmware-desc">Original firmware</div>
                </div>
                <div class="firmware-card" data-firmware="Classic2">
                    <div class="firmware-name">Classic 2</div>
                    <div class="firmware-desc">Updated firmware</div>
                </div>
                <div class="firmware-card" data-firmware="Santroller">
                    <div class="firmware-name">Santroller</div>
                    <div class="firmware-desc">Enhanced features</div>
                </div>
            </div>

            <button class="flash-btn" id="flashBtn" disabled>
                Select firmware to flash
            </button>
        </div>

        <div class="progress-section" id="progressSection">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Preparing...</div>
            <div class="log" id="log"></div>
        </div>
    </div>

    <script src="renderer-simple.js"></script>
</body>
</html>
